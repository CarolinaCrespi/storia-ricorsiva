<script>
/* ══════ MUSICA FIABESCA — arpa cristallina + flauto dolce ══════ */
let audioCtx=null, masterGain=null, reverbNode=null, musicStarted=false;

// Scala LIDIA in Sol (G A B C# D E F# G) — la più "magica", luminosa, fiabesca
// Frequenze in Hz (registro medio-alto)
const LYDIAN_G = [
  392.00, // G4
  440.00, // A4
  493.88, // B4
  554.37, // C#5
  587.33, // D5
  659.25, // E5
  739.99, // F#5
  783.99, // G5
  880.00, // A5
  987.77, // B5
  1108.73,// C#6
];

// Melodia flauto — frasi leggere, saltellanti, da favola
const FLUTE_PHRASES = [
  [4,5,6,5,4,2,0,2],   // frase A — sale e scende dolcemente
  [0,2,4,6,5,4,2,4],   // frase B — slancio verso l'alto
  [6,5,4,2,4,5,6,7],   // frase C — giro luminoso
  [4,2,0,2,4,5,4,2],   // frase D — ritorno tranquillo
  [0,4,2,5,4,6,5,4],   // frase E — variazione
];

// Accordi lidie — tutti maggiori, aperti, luminosi
const HARP_CHORDS = [
  [0,2,4,6],  // G maj7  (G B D F#)
  [2,4,6,8],  // A7sus   (A C# E A)
  [4,6,8,5],  // D add9  (D F# A E)
  [0,2,5,7],  // G/E     (G B E G)
];

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.setValueAtTime(0,audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.5,audioCtx.currentTime+2.5);
  masterGain.connect(audioCtx.destination);

  // Riverbero leggero (sala piccola, non cupa)
  const rl=Math.floor(audioCtx.sampleRate*1.1);
  const rb=audioCtx.createBuffer(2,rl,audioCtx.sampleRate);
  for(let c=0;c<2;c++){
    const d=rb.getChannelData(c);
    for(let i=0;i<rl;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/rl,3.5)*(i<200?i/200:1);
  }
  reverbNode=audioCtx.createConvolver(); reverbNode.buffer=rb;
  const revGain=audioCtx.createGain(); revGain.gain.value=0.18;
  reverbNode.connect(revGain); revGain.connect(masterGain);
}

/* ── Glitter: scintille acute casuali (effetto magico) ── */
function sparkle(when){
  const freqs=[1318,1568,1760,2093,1976,1397];
  const f=freqs[Math.floor(Math.random()*freqs.length)];
  const o=audioCtx.createOscillator(); o.type='sine'; o.frequency.value=f;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0,when);
  g.gain.linearRampToValueAtTime(0.04,when+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,when+0.22);
  o.connect(g); g.connect(masterGain);
  o.start(when); o.stop(when+0.25);
}

/* ── Pluck arpa cristallino ── */
function harpPluck(freq, when, vol=0.14){
  const t=when;
  // fondamentale
  const o1=audioCtx.createOscillator(); o1.type='sine'; o1.frequency.value=freq;
  // seconda armonica (brillantezza)
  const o2=audioCtx.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2.0;
  // terza armonica (cristallo)
  const o3=audioCtx.createOscillator(); o3.type='sine'; o3.frequency.value=freq*3.01;

  const g1=audioCtx.createGain();
  g1.gain.setValueAtTime(0,t);
  g1.gain.linearRampToValueAtTime(vol,t+0.006);
  g1.gain.exponentialRampToValueAtTime(vol*0.25,t+0.15);
  g1.gain.exponentialRampToValueAtTime(0.0001,t+2.8);

  const g2=audioCtx.createGain();
  g2.gain.setValueAtTime(0,t);
  g2.gain.linearRampToValueAtTime(vol*0.5,t+0.004);
  g2.gain.exponentialRampToValueAtTime(0.0001,t+0.6);

  const g3=audioCtx.createGain();
  g3.gain.setValueAtTime(0,t);
  g3.gain.linearRampToValueAtTime(vol*0.22,t+0.003);
  g3.gain.exponentialRampToValueAtTime(0.0001,t+0.18);

  o1.connect(g1); g1.connect(masterGain); g1.connect(reverbNode);
  o2.connect(g2); g2.connect(masterGain); g2.connect(reverbNode);
  o3.connect(g3); g3.connect(masterGain);
  o1.start(t); o1.stop(t+3.0);
  o2.start(t); o2.stop(t+0.7);
  o3.start(t); o3.stop(t+0.25);
}

/* ── Nota flauto dolce (sine pura + vibrato gentile) ── */
function fluteNote(freq, when, dur, vol=0.11){
  const t=when;
  const osc=audioCtx.createOscillator(); osc.type='sine'; osc.frequency.value=freq;
  // vibrato delicato che entra piano
  const vib=audioCtx.createOscillator(); vib.type='sine'; vib.frequency.value=5.8;
  const vibG=audioCtx.createGain();
  vibG.gain.setValueAtTime(0,t);

/* ── Sequencer in loop ── */
const BEAT=0.48;
const BAR=BEAT*8;
let seqTimer=null, seqPhrase=0, seqBar=0;

function scheduleBar(startTime){
  const chord=HARP_CHORDS[seqBar%HARP_CHORDS.length];
  const melody=FLUTE_PHRASES[seqPhrase%FLUTE_PHRASES.length];

  // Arpeggio arpa — pattern ascendente leggero
  const arp=[0,1,2,3,2,1,0,1];
  arp.forEach((ci,bi)=>{
    const ni=chord[ci%chord.length];
    const freq=LYDIAN_G[ni];
    const when=startTime+bi*BEAT;
    const vol=0.09+Math.random()*0.05;
    harpPluck(freq,when,vol);
    // nota bassa ogni 2 beat
    if(bi%2===0){
      const bassFreq=LYDIAN_G[chord[0]]*0.5;
      harpPluck(bassFreq,when,0.07);
    }
    // scintilla casuale
    if(Math.random()<0.15) sparkle(when+BEAT*0.5);
  });

  // Melodia flauto — note più lunghe, melodiose
  melody.forEach((mi,fi)=>{
    const freq=LYDIAN_G[Math.min(mi,LYDIAN_G.length-1)];
    const when=startTime+fi*BEAT;
    // alterna note lunghe e corte per naturalezza
    const dur=(fi%3===2)?BEAT*0.7:BEAT*1.4;
    fluteNote(freq,when,dur,0.09+Math.random()*0.03);
  });

  seqBar++;
  if(seqBar%4===0) seqPhrase=(seqPhrase+1)%FLUTE_PHRASES.length;
}

function startMusic(){
  if(musicStarted||!audioCtx)return;
  musicStarted=true;
  let t=audioCtx.currentTime+0.8;
  function tick(){
    while(t<audioCtx.currentTime+BAR*2){
      scheduleBar(t);
      t+=BAR;
    }
    seqTimer=setTimeout(tick,BAR*1000*0.75);
  }
  tick();
}

/* ══════ PAGES ══════ */
const PAGES=[
  {text:"C\u2019era una volta un re",         illus:SVG.king_castle,  drop:true},
  {text:"seduto sul sof\u00e0",              illus:SVG.king_sofa,    drop:false},
  {text:"che disse alla sua serva",           illus:SVG.king_maid,    drop:false},
  {text:"\u00abRaccontami una storia\u00bb", illus:SVG.maid_book,    drop:false},
  {text:"La storia incominci\u00f2\u2026",   illus:SVG.book_in_book, drop:false},
];

function toRoman(n){const v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];let r='';for(let i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i];}return r;}
function chapterName(d){return'Capitolo '+toRoman(d+1);}

const pc=document.getElementById('particles');
for(let i=0;i<26;i++){const p=document.createElement('div');p.className='particle';const sz=.8+Math.random()*2;p.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;animation-duration:${12+Math.random()*18}s;animation-delay:${-Math.random()*24}s;opacity:0;`;pc.appendChild(p);}

function setLabel(t){document.getElementById('label').textContent=t;}
function setBadge(t){document.getElementById('badge').textContent=t;}

function buildBook(depth){
  const crownSVG=`<svg class="crown-svg" viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d8a030"/><stop offset="100%" stop-color="#8b5c10"/></linearGradient></defs>
    <polygon points="4,46 4,18 20,30 40,4 60,30 76,18 76,46" fill="url(#cg)"/>
    <rect x="4" y="40" width="72" height="8" rx="2" fill="#7a4e0a"/>
    <rect x="4" y="40" width="72" height="3" rx="1" fill="#d8a030" opacity=".4"/>
    <circle cx="40" cy="8"  r="5.5" fill="#8b1a1a"/><circle cx="40" cy="8"  r="3" fill="#c04040" opacity=".6"/>
    <circle cx="12" cy="26" r="4"   fill="#1a3a6b"/>
    <circle cx="68" cy="26" r="4"   fill="#1a3a6b"/>
    <circle cx="26" cy="41" r="2.8" fill="#e8b84b"/>
    <circle cx="54" cy="41" r="2.8" fill="#e8b84b"/>
    <circle cx="40" cy="41" r="2.8" fill="#8b1a1a"/>
  </svg>`;
  const book=document.createElement('div'); book.className='book';
  if(depth>0)book.style.animation='none';
  const cBack=div('c-back'); cBack.innerHTML=`<div class="corner corner-tl"></div><div class="corner corner-bl"></div>`;
  const spineEl=div('spine'); spineEl.innerHTML=`<div class="spine-mid"></div>`;
  const cFront=div('c-front'); const pArea=div('pages-area');
  const leftPg=div('left-page'); leftPg.appendChild(div('page-frame')); pArea.appendChild(leftPg);
  const leaves=[];
  PAGES.forEach((pg,i)=>{
    const leaf=div('leaf'); leaf.style.zIndex=(PAGES.length-i)+5;
    const front=div('leaf-front');
    const txt=document.createElement('p'); txt.className='page-text';
    if(pg.drop){txt.innerHTML=`<span class="drop">${pg.text[0]}</span>${pg.text.slice(1)}`;}else{txt.textContent=pg.text;}
    const frame=div('page-frame');
    if(pg.illus){const w=document.createElement('div');w.innerHTML=pg.illus;front.appendChild(w.firstElementChild);}
    front.appendChild(txt); front.appendChild(frame);
    if(i===PAGES.length-1){const o=document.createElement('span');o.className='orn';o.textContent='\u2767';front.appendChild(o);}
    const pn=document.createElement('div'); pn.className='page-num'; pn.textContent=`\u2014 ${i+1} \u2014`;
    front.appendChild(pn); leaf.appendChild(front); leaf.appendChild(div('leaf-back'));
    pArea.appendChild(leaf); leaves.push(leaf);
  });
  const cClosed=div('c-closed');
  cClosed.innerHTML=`<div class="cc-back"></div><div class="cc-spine"></div><div class="cc-front"><div class="cc-front-inner"></div>${crownSVG}<div class="c-title">C&apos;era una volta<br>un re&hellip;</div><div class="c-castle">${SVG.king_castle}</div></div>`;
  book.appendChild(cBack); book.appendChild(pArea); book.appendChild(spineEl); book.appendChild(cFront); book.appendChild(cClosed);
  return{book,leaves};
}
function div(cls){const e=document.createElement('div');e.className=cls;return e;}

let depth=0,busy=false;
function init(){
  depth=0;busy=false;
  const scene=document.getElementById('scene');
  scene.className=''; scene.style.transform=''; scene.style.opacity=''; scene.innerHTML='';
  setBadge(chapterName(0));
  const{book,leaves}=buildBook(0); scene.appendChild(book);
  setTimeout(()=>openBook(book,leaves),3000);
}
function openBook(book,leaves){
  if(busy)return; busy=true;
  setBadge(chapterName(depth));
  initAudio();
  startMusic();
  book.classList.add('open');
  const LABELS=["C\u2019era una volta un re\u2026","seduto sul sof\u00e0\u2026","che disse alla sua serva\u2026","\u00abRaccontami una storia\u00bb\u2026","La storia incominci\u00f2\u2026"];
  let idx=0;
  function nextLeaf(){
    if(idx>=leaves.length)return;
    const isLast=idx===leaves.length-1;
    setTimeout(()=>{
      setLabel(LABELS[idx]||'\u2026'); leaves[idx].classList.add('turned'); idx++;
      if(!isLast)setTimeout(nextLeaf,2300);
      else setTimeout(()=>{busy=false;zoomIntoBook();},1900);
    },idx===0?2500:0);
  }
  nextLeaf();
}
function zoomIntoBook(){
  const scene=document.getElementById('scene'); scene.classList.add('zoom-in');
  setTimeout(()=>{
    scene.className='zoom-out'; scene.innerHTML=''; depth++; setBadge(chapterName(depth));
    const{book,leaves}=buildBook(depth); scene.appendChild(book);
    requestAnimationFrame(()=>{
      scene.className='fade-in';
      setTimeout(()=>{scene.className=''; setTimeout(()=>openBook(book,leaves),400);},650);
    });
  },720);
}
// Avvia audio al primo click/tocco — gestisce overlay
function onFirstInteraction(){
  const overlay=document.getElementById('start-overlay');
  if(!overlay)return;
  initAudio();
  startMusic();
  overlay.classList.add('hiding');
  setTimeout(()=>overlay.remove(), 1300);
}
document.getElementById('start-overlay').addEventListener('click', onFirstInteraction, {once:true});
document.addEventListener('keydown', onFirstInteraction, {once:true});
init();
</script>
